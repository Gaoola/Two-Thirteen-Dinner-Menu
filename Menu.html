<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TWO THIRTEEN | Menu Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root { 
            --text-color: #1a1a1a; 
            --accent-red: #8b0000;
            --watermark-color: rgba(0, 0, 0, 0.05);
        }

        /* UI STYLES */
        body { font-family: 'Montserrat', sans-serif; background: #e8e8e8; margin: 0; padding: 20px; }
        .config-panel { background: white; max-width: 1100px; margin: 0 auto 40px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .ui-category-group { background: #fdfdfd; border-radius: 8px; border: 1px solid #eaeaea; overflow: hidden; margin-bottom: 10px; }
        .ui-category-header { background: #f8f8f8; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .ui-category-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-red); font-weight: 700; margin: 0; }
        .ui-category-content { padding: 10px 18px; }
        .ui-category-group.collapsed .ui-category-content { display: none; }
        .dish-item { display: flex; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f2f2f2; }
        .dish-item input { margin-top: 6px; margin-right: 14px; transform: scale(1.3); }
        .dish-info strong { font-size: 1.1rem; color: var(--text-color); display: block; }
        .dish-info small { color: #777; font-size: 0.85rem; font-family: 'Noto Serif SC', serif; }
        button { width: 320px; padding: 20px; background: var(--text-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; display: block; margin: 40px auto 0; }

        /* PRINTED MENU LAYOUT */
        #menu-container {
            background: white; width: 8.5in; height: auto; max-height: 11in; 
            margin: 0 auto; padding: 0.8in 1.2in; box-sizing: border-box; 
            color: var(--text-color); position: relative; text-align: center; 
            visibility: hidden; position: absolute; left: -9999px; overflow: hidden;
        }

        .header { 
    position: relative; /* This is the anchor */
    margin-bottom: 20px; 
    z-index: 2; 
}

.watermark { 
    font-family: 'Ma Shan Zheng', serif; 
    position: absolute; 
    /* Position exactly in the center of the header */
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    
    color: var(--watermark-color); 
    z-index: -1; /* Place it behind the H1 text */
    pointer-events: none; 
    line-height: 1;
    white-space: nowrap;
}

.header h1 {
    position: relative;
    z-index: 2; /* Ensure text sits on top of watermark */
    background: transparent;
}

.address-box p { letter-spacing: 4px; margin: 15px 0 0 0; text-transform: uppercase; border-top: 0.5px solid #333; display: inline-block; padding-top: 10px; font-size: 7.5pt; font-weight: 300; }

        #menu-body { position: relative; z-index: 1; display: block; clear: both;}

        .section-header { 
            font-family: 'Montserrat', sans-serif; font-weight: 300; text-transform: uppercase; 
            color: #666; display: flex; align-items: center; justify-content: center;
        }
        .section-header::before, .section-header::after { content: ""; flex: 1; height: 0.5px; background: #eee; margin: 0 20px; }

        .dish { page-break-inside: avoid; }
        .dish-cn { font-family: 'Noto Serif SC', serif; color: var(--accent-red); display: block; margin-bottom: 5px; }
        .dish-en { font-family: 'Bodoni Moda', serif; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 8px; }
        .dish-desc { max-width: 90%; margin: 0 auto; font-family: 'Bodoni Moda', serif; font-style: italic; color: #444; }

        .footer { position: absolute; bottom: 0.7in; left: 0; right: 0; z-index: 1; text-align: center; }
        .footer-line { font-size: 10pt; color: #ccc; margin-bottom: 10px; letter-spacing: 8px; }
        .footer-text { font-style: italic; font-size: 9.5pt; font-family: 'Bodoni Moda', serif; color: #888; max-width: 60%; margin: 0 auto; }

        @media print {
            .config-panel { display: none; }
            body { background: white; padding: 0; }
            #menu-container { display: block !important; visibility: visible !important; position: relative !important; left: 0 !important; margin: 0; box-shadow: none; }
            @page { size: letter; margin: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        /* Dual-Bucket Grid Layout */
.two-bucket-layout {
    display: grid;
    grid-template-columns: 1fr 1fr; /* Two equal columns */
    column-gap: 0.6in;
    text-align: left;
    align-items: start;
    margin-bottom: 50px;
}

/* Specific styling for the columns */
#main-course-col, #others-col {
    display: flex;
    flex-direction: column;
}

/* Ensure section headers inside columns look refined */
.two-bucket-layout .section-header {
    width: 100%;
    margin-top: 20px !important;
    font-size: 8pt !important;
    justify-content: flex-start; /* Aligned to the left of the column */
}

.two-bucket-layout .section-header::before { display: none; } /* Remove left line in grid mode */

.two-bucket-layout .dish {
    text-align: left;
}

.two-bucket-layout .dish-desc {
    max-width: 100%;
    margin: 0;
}

/* DEFAULT: Chinese is Hero (Red), English is Subtitle (Grey) */
.dish-cn { 
    font-family: 'Noto Serif SC', serif; 
    color: var(--accent-red); 
    font-weight: 700;
}
.dish-en { 
    font-family: 'Bodoni Moda', serif; 
    font-style: italic; 
    text-transform: none; 
    color: #666;
    font-weight: 400;
}

/* SWAPPED: English becomes Hero (Red), Chinese becomes Subtitle (Grey) */
.swapped .dish-en { 
    font-family: 'Bodoni Moda', serif; 
    font-weight: 700; 
    text-transform: uppercase; 
    font-style: normal;
    color: var(--accent-red); /* Changed from var(--text-color) to Red */
}

.swapped .dish-cn { 
    font-family: 'Noto Serif SC', serif; 
    color: #888; 
    font-weight: 400;
}
    </style>
</head>
<body>

<div class="config-panel">
    <h2 style="margin-top:0; font-family: 'Bodoni Moda'; letter-spacing: 2px; text-align: center;">TWO THIRTEEN</h2>
    <div id="loader" style="text-align: center; color: #888;">Opening the vault...</div>
    <div style="text-align: center; margin-bottom: 20px;">
    <label style="font-weight: 600; letter-spacing: 1px; cursor: pointer;">
        <input type="checkbox" id="swap-language" onchange="renderMenu()" style="transform: scale(1.2); margin-right: 10px;"> 
        SWAP CHINESE & ENGLISH ORDER
    </label>
</div>
    <div id="selector"></div>
    <button onclick="window.print()">GENERATE & PRINT MENU</button>
</div>

<div id="menu-container">
    <div class="header">
        <div class="watermark">高</div>
        <h1>TWO<br>THIRTEEN</h1> 
        <div class="address-box">
            <p>213 Hope Ave &nbsp; ◈ &nbsp; The Gao Residence</p>
        </div>
    </div>
    <div id="menu-body"></div>
    <div class="footer">
        <div class="footer-line">◈ &nbsp; ◈ &nbsp; ◈</div>
        <div class="footer-text">"By invitation only. Gratuity in the form of prayers is encouraged."</div>
    </div>
</div>

<script>
    const SHEET_ID = '1sK7-edwM0bVrVklj6nM7YCsK6IJaz4kLNpcl0pPL4QE';
    const TAB_NAME = 'Dinner';
    let masterDishes = [];

    window.googleDocCallback = function(data) {
        try {
            const rows = data.table.rows;
            masterDishes = rows.map((row, index) => {
                const c = row.c;
                return {
                    id: index,
                    cnName: c[0] ? c[0].v : "",
                    enName: c[1] ? c[1].v : "",
                    reality: c[2] ? c[2].v : "",
                    desc: c[3] ? c[3].v : "",
                    category: c[4] ? c[4].v : "Other",
                    active: c[5] ? (c[5].v === true || c[5].v === "TRUE") : false
                };
            }).filter(d => d.reality !== "" && d.reality !== null);
            renderSelector();
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('loader').innerHTML = "Sync Error. Check Sheet ID.";
        }
    };

    function initSync() {
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleDocCallback&sheet=${encodeURIComponent(TAB_NAME)}`;
        document.body.appendChild(script);
    }

    function toggleCategory(header) {
        header.parentElement.classList.toggle('collapsed');
    }

    function renderSelector() {
        const selector = document.getElementById('selector');
        selector.innerHTML = '';
        const categories = [...new Set(masterDishes.map(d => d.category))];
        categories.forEach(cat => {
            const group = document.createElement('div');
            group.className = 'ui-category-group';
            group.innerHTML = `<div class="ui-category-header" onclick="toggleCategory(this)"><h3 class="ui-category-title">${cat}</h3><span>▼</span></div><div class="ui-category-content"></div>`;
            const content = group.querySelector('.ui-category-content');
            masterDishes.filter(d => d.category === cat).forEach(d => {
                const item = document.createElement('div');
                item.className = 'dish-item';
                item.innerHTML = `<input type="checkbox" id="d${d.id}" onchange="renderMenu()" ${d.active ? 'checked' : ''}><div class="dish-info"><strong>${d.reality}</strong><small>${d.cnName}</small></div>`;
                content.appendChild(item);
            });
            selector.appendChild(group);
        });
        renderMenu();
    }
    function renderMenu() {
    const container = document.getElementById('menu-container');
    const body = document.getElementById('menu-body');
    const watermark = document.querySelector('.watermark');
    const headerH1 = document.querySelector('.header h1');
    const addressP = document.querySelector('.address-box p');
    
    const selected = masterDishes.filter(d => document.getElementById(`d${d.id}`)?.checked);

    if (selected.length > 0) {
        container.style.visibility = 'visible';
        container.style.position = 'relative';
        container.style.left = '0';
        container.style.display = 'block';

        const isSwapped = document.getElementById('swap-language').checked;

        // 1. Separate Categories
        const footerCats = ["beverage", "dessert"];
        const mainSelected = selected.filter(d => !footerCats.includes(d.category.trim().toLowerCase()));
        const bottomSelected = selected.filter(d => footerCats.includes(d.category.trim().toLowerCase()));

        const mainCategories = [...new Set(mainSelected.map(d => d.category))];
        const bottomCategories = [...new Set(bottomSelected.map(d => d.category))];
        const mainHasGrid = mainCategories.some(cat => cat.trim().toLowerCase() !== "main course");

        let currentScale = 1.0; 
        const PAGE_HEIGHT = 1056; 
        const FOOTER_RESERVE = 280; 
        const TARGET_HEIGHT = PAGE_HEIGHT - FOOTER_RESERVE;

        // --- INTERNAL HELPER FUNCTION ---
        function renderCategory(catName, sourceList, targetEl, scale, isSwapped, isGrid, isFooter = false) {
            const head = document.createElement('div');
            head.className = 'section-header';
            head.style.fontSize = (9 * scale) + 'pt';
            
            // Tighten the gap for footer categories
            const topMargin = isFooter ? (10 * scale) : (isGrid ? 25 : 35) * scale;
            head.style.margin = topMargin + 'px 0 ' + (isGrid ? 15 : 20) * scale + 'px';
            
            head.innerText = catName;
            targetEl.appendChild(head);

            sourceList.filter(d => d.category === catName).forEach(d => {
                const div = document.createElement('div');
                div.className = 'dish';
                div.style.marginBottom = (isGrid ? 30 : 40) * scale + 'px';
                
                const heroSize = (isGrid ? 20 : 22) * scale;
                const subSize = (isGrid ? 11 : 12) * scale;

                const cnBlock = `<span class="dish-cn" style="font-size: ${isSwapped ? subSize : heroSize}pt;">${d.cnName}</span>`;
                const enBlock = `<span class="dish-en" style="font-size: ${isSwapped ? heroSize : subSize}pt; letter-spacing: ${isSwapped ? 2*scale : 0}px;">${d.enName}</span>`;

                div.innerHTML = `
                    ${isSwapped ? enBlock : cnBlock}
                    ${isSwapped ? cnBlock : enBlock}
                    <div class="dish-desc" style="font-size: ${(isGrid ? 9.5 : 10) * scale}pt; line-height: 1.5;">${d.desc}</div>
                `;
                targetEl.appendChild(div);
            });
        }

        function buildMenu(scale) {
            if (isSwapped) body.classList.add('swapped');
            else body.classList.remove('swapped');

            headerH1.style.fontSize = (28 * scale) + 'pt';
            headerH1.style.letterSpacing = (14 * scale) + 'px';
            addressP.style.fontSize = (7.5 * scale) + 'pt';
            addressP.style.letterSpacing = (4 * scale) + 'px';
            addressP.style.marginTop = (15 * scale) + 'px';
            if(watermark) watermark.style.fontSize = (200 * scale) + 'pt';

            body.innerHTML = '';

            // --- PART A: MAIN FOOD ---
            const mainGrid = document.createElement('div');
            if (mainHasGrid) {
                mainGrid.className = 'two-bucket-layout';
                const left = document.createElement('div'); left.id = "main-course-col";
                const right = document.createElement('div'); right.id = "others-col";
                mainGrid.appendChild(left); mainGrid.appendChild(right);

                mainCategories.forEach(cat => {
                    const isMain = cat.trim().toLowerCase() === "main course";
                    renderCategory(cat, mainSelected, isMain ? left : right, scale, isSwapped, true);
                });
            } else {
                mainGrid.style.textAlign = 'center';
                mainCategories.forEach(cat => renderCategory(cat, mainSelected, mainGrid, scale, isSwapped, false));
            }
            body.appendChild(mainGrid);

            // --- PART B: AFTER DISHES (BEVERAGE/DESSERT) ---
            if (bottomSelected.length > 0) {
                const bottomGrid = document.createElement('div');
                bottomGrid.className = 'two-bucket-layout';
                bottomGrid.style.marginTop = '0px'; 
                
                const bLeft = document.createElement('div');
                const bRight = document.createElement('div');
                bottomGrid.appendChild(bLeft);
                bottomGrid.appendChild(bRight);

                bottomCategories.forEach(cat => {
                    const isBev = cat.trim().toLowerCase() === "beverage";
                    renderCategory(cat, bottomSelected, isBev ? bLeft : bRight, scale, isSwapped, true, true);
                });
                body.appendChild(bottomGrid);
            }
        }

        // --- THE ENGINE ---
        buildMenu(currentScale);
        let currentHeight = body.offsetHeight + body.offsetTop;
        let safety = 0;
        while (currentHeight < (TARGET_HEIGHT - 40) && currentScale < 2.5 && safety < 100) {
            currentScale += 0.05; buildMenu(currentScale); currentHeight = body.offsetHeight + body.offsetTop; safety++;
        }
        safety = 0;
        while (currentHeight > TARGET_HEIGHT && currentScale > 0.3 && safety < 100) {
            currentScale -= 0.02; buildMenu(currentScale); currentHeight = body.offsetHeight + body.offsetTop; safety++;
        }
    } else {
        container.style.visibility = 'hidden';
        container.style.position = 'absolute';
        container.style.left = '-9999px';
    }
}
initSync();
</script>
</body>
</html>
